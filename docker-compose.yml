# Two services: the Daphne ASGI app and Redis (Channels layer + authoritative live state).
#
# Live game/presence state is shared via Redis, but game rooms are not sharded across workers, so
# run a single `app` replica for now. channels_redis is what makes scaling out possible later
# (it would also need room affinity / sharding).
#
# Copy .env.example to .env and edit before running `docker compose up`.
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WORD_PLAY_DEBUG: "0"
      WORD_PLAY_ALLOWED_HOSTS: "*"
      WORD_PLAY_SECRET_KEY: "${SECRET_KEY:-change-me-for-real-deployments}"
      WORD_PLAY_DB_PATH: "/app/data/db.sqlite3"
      WORD_PLAY_REDIS_URL: "redis://redis:6379/0"
    volumes:
      - "${DB_DIR:-./data}:/app/data"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  redisdata:
